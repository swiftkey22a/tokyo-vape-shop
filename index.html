<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKYO VAPE · 東京</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* === ВСЕ ТВОИ СТИЛИ БЕЗ ИЗМЕНЕНИЙ === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0c;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            padding: 20px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 32px 20px;
            margin-bottom: 28px;
            background: rgba(12, 12, 14, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(255, 255, 255, 0.3) 20%,
                rgba(255, 255, 255, 0.6) 50%,
                rgba(255, 255, 255, 0.3) 80%,
                transparent 100%);
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: white;
            text-transform: uppercase;
        }
        .japanese {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-family: 'Hiragino Sans', 'MS Gothic', monospace;
            margin-top: 12px;
        }
        .category-tagline {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            font-weight: 300;
        }
        .search-box {
            margin: 24px 0;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 16px 24px 16px 52px;
            background: rgba(15, 15, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            font-weight: 400;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
            letter-spacing: 1px;
        }
        .search-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
        }
        .categories {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin: 24px 0;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .category-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            letter-spacing: 1.5px;
            font-weight: 400;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .category-btn:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
        }
        .category-btn.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin: 20px 0 100px;
        }
        @media (min-width: 640px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .product-card {
            background: rgba(12, 12, 15, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s;
            position: relative;
        }
        .product-card:hover {
            background: rgba(15, 15, 18, 0.9);
        }
        .product-card::after {
            content: '東京';
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            font-family: 'MS Gothic', monospace;
        }
        .product-brand {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .product-taste {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 16px;
            line-height: 1.45;
        }
        .product-details {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.8rem;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .product-price {
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            text-align: right;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .product-price::after {
            content: ' ₽';
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.45);
            margin-left: 2px;
        }
        .add-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .add-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
        .add-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .in-stock { color: #a0e0a0; font-weight: 500; }
        .low-stock { color: #ffd280; font-weight: 500; }
        .out-stock { color: #ffa0a0; font-weight: 500; }
        .cart-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(18, 18, 22, 0.9);
            backdrop-filter: blur(12px);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            cursor: pointer;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cart-btn:hover {
            background: rgba(22, 22, 28, 0.95);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            color: black;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 500;
        }
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cart-overlay.show {
            display: flex;
            opacity: 1;
        }
        .cart-modal {
            background: rgba(18, 18, 22, 0.95);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cart-header h2 {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: white;
            text-transform: uppercase;
        }
        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 8px;
            transition: color 0.2s;
            line-height: 1;
        }
        .close-btn:hover {
            color: white;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            max-height: 50vh;
            padding-right: 8px;
        }
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .cart-item-brand {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .cart-item-taste {
            color: white;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-item-price {
            color: #a0e0a0;
            font-size: 0.95rem;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-item-controls button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .cart-item-controls button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .cart-item-controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .cart-item-quantity {
            font-size: 1.1rem;
            min-width: 24px;
            text-align: center;
            color: white;
        }
        .cart-total {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cart-total span:first-child {
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
        }
        .cart-total span:last-child {
            color: white;
            font-size: 1.3rem;
            font-weight: 500;
        }
        .cart-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .cart-action-btn {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.85);
        }
        .cart-action-btn.order {
            background: rgba(160, 224, 160, 0.15);
            border-color: rgba(160, 224, 160, 0.3);
            color: #a0e0a0;
        }
        .cart-action-btn.clear {
            background: rgba(255, 160, 160, 0.15);
            border-color: rgba(255, 160, 160, 0.3);
            color: #ffa0a0;
        }
        .cart-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
        .cart-action-btn.order:hover {
            background: #a0e0a0;
            color: black;
        }
        .cart-action-btn.clear:hover {
            background: #ffa0a0;
            color: black;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 2px;
        }
        .spinner {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease; }

        /* === НОВЫЕ СТИЛИ ДЛЯ ФОТО БРЕНДОВ === */
        .brand-photo {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            opacity: 0.9;
            transition: opacity 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-photo:hover {
            opacity: 1;
        }

        /* === СТИЛИ ДЛЯ ТОСТОВ === */
        .toast {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            z-index: 3000;
            animation: slideDown 0.3s ease, fadeOut 0.3s ease 2s;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
            max-width: 400px;
            margin: 0 auto;
            letter-spacing: 0.5px;
        }
        .toast.success {
            border-left: 4px solid #a0e0a0;
        }
        .toast.info {
            border-left: 4px solid #a0c0ff;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header fade-in">
            <div class="logo">𝘛𝘰𝘬𝘺𝘰 𝘷𝘢𝘱𝘦 🗾</div>
            <div class="japanese">東京ベイプ</div>
            <div class="category-tagline">LIQUID · DEVICE · PADS · PARTS</div>
        </div>
        
        <div class="search-box">
            <span class="search-icon">⚲</span>
            <input type="text" id="searchInput" class="search-input" placeholder="ПОИСК ПО ВКУСАМ">
        </div>
        
        <div class="categories" id="categories"></div>
        
        <div id="productsContainer">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>ЗАГРУЗКА КАТАЛОГА</p>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
        
        <div class="cart-btn" onclick="openCart()">
            🛒
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО КОРЗИНЫ -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCartOnOverlay(event)">
        <div class="cart-modal" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h2>КОРЗИНА</h2>
                <button class="close-btn" onclick="closeCart()">✕</button>
            </div>
            <div class="cart-items" id="cartItemsList"></div>
            <div class="cart-total" id="cartTotal">
                <span>ИТОГО</span>
                <span>0 ₽ (0 шт.)</span>
            </div>
            <div class="cart-actions">
                <button class="cart-action-btn order" onclick="submitOrder()">ЗАКАЗ</button>
                <button class="cart-action-btn clear" onclick="clearCart()">ОЧИСТИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz6NKVuQmkWsE-0Xhy53-ZxljGkLCujVOwnP_SyatMyLY4zUixLqeEjAn_4p2KROpnKDg/exec';
        const SELLER_USERNAME = 'drugsoutlety';

        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('tokyoCart')) || {};

        // Состояние навигации
        let currentCategory = null;
        let currentBrand = null;

        // === ССЫЛКИ НА ФОТО БРЕНДОВ (ДОБАВЛЯЙ СЮДА) ===
        const brandImages = {
            'ANIMMA': '',
            'ЗЛАЯ МОНАШКА ICE': '', // сюда добавишь позже
            'VAPORESSO': '',          // сюда добавишь позже
            // ... остальные бренды
        };

        // === ТОСТ УВЕДОМЛЕНИЕ ===
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2500);
        }

        // === ОБРАБОТКА МАКСИМУМА ===
        function handleMaxLimit(product) {
            const messages = [
                `💫 на сегодня хватит · ${product.stock} шт`,
                `✨ это максимум · ${product.stock} шт`,
                `☯️ достаточно · лимит ${product.stock} шт`,
                `🌸 больше не надо · ${product.stock} шт в корзине`,
                `🍵 спокойствие · уже ${product.stock} шт`
            ];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            showToast(randomMessage, 'info');
        }

        // === Эмодзи по вкусу/бренду ===
        function getEmojiForProduct(product) {
            const taste = product.taste?.toLowerCase() || '';
            const brand = product.brand?.toLowerCase() || '';
            if (taste.includes('вишн')) return '🍒';
            if (taste.includes('арбуз')) return '🍉';
            if (taste.includes('клубник')) return '🍓';
            if (taste.includes('малин')) return '🫐';
            if (taste.includes('ананас')) return '🍍';
            if (taste.includes('апельсин')) return '🍊';
            if (taste.includes('лимон')) return '🍋';
            if (taste.includes('виноград')) return '🍇';
            if (taste.includes('персик')) return '🍑';
            if (taste.includes('киви')) return '🥝';
            if (brand.includes('animma')) return '🔥';
            if (brand.includes('монашк')) return '😈';
            if (brand.includes('vaporesso')) return '⚡';
            if (brand.includes('самоубийц')) return '💀';
            return '◈';
        }

        // === ЗАГРУЗКА ТОВАРОВ ===
        async function loadProducts() {
            try {
                const response = await fetch(GOOGLE_SHEETS_URL + '?t=' + Date.now());
                const data = await response.json();
                if (data.success) {
                    allProducts = data.products || [];
                    renderCategories(data.categories || []);
                    currentCategory = null;
                    currentBrand = null;
                    renderCurrentView();
                    updateCartCount();
                }
            } catch (error) {
                console.log('Ошибка загрузки, используем тестовые данные');
                loadTestData();
            }
            document.getElementById('loading').classList.add('hidden');
        }

        // === ТЕСТОВЫЕ ДАННЫЕ ===
        function loadTestData() {
            allProducts = [
                { id: '1', brand: 'ANIMMA', taste: 'ITACHI ВИШНЯ АЙС', price: 350, strength: '70MG', stock: 2, category: 'ICED' },
                { id: '2', brand: 'ANIMMA', taste: 'JUGO АРБУЗ АЙС', price: 350, strength: '70MG', stock: 3, category: 'ICED' },
                { id: '3', brand: 'ANIMMA', taste: 'SASUKE МАЛИНА АЙС', price: 350, strength: '70MG', stock: 3, category: 'ICED' },
                { id: '4', brand: 'ЗЛАЯ МОНАШКА ICE', taste: 'MANGO MIX', price: 550, strength: '50MG', stock: 5, category: 'ICED' },
                { id: '5', brand: 'VAPORESSO XROS 5', taste: 'RED LEATHER', price: 2400, strength: 'Устройство', stock: 1, category: 'PODS' }
            ];
            renderCategories(['ICED','PODS']);
            currentCategory = null;
            currentBrand = null;
            renderCurrentView();
        }

        // === ОТОБРАЖЕНИЕ КНОПОК КАТЕГОРИЙ ===
        function renderCategories(cats) {
            const container = document.getElementById('categories');
            container.innerHTML = '<button class="category-btn" onclick="showAll()">◈ ВСЕ</button>';
            cats.sort().forEach(cat => {
                const activeClass = (currentCategory === cat && currentBrand === null) ? 'active' : '';
                container.innerHTML += `<button class="category-btn ${activeClass}" onclick="selectCategory('${cat}')">◈ ${cat}</button>`;
            });
        }

        // === ВЫБОР КАТЕГОРИИ ===
        function selectCategory(cat) {
            currentCategory = cat;
            currentBrand = null;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(cat)) btn.classList.add('active');
            });
            renderCurrentView();
        }

        // === ПОКАЗ ВСЕХ ТОВАРОВ ===
        function showAll() {
            currentCategory = null;
            currentBrand = null;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            const allBtn = Array.from(document.querySelectorAll('.category-btn')).find(btn => btn.textContent.includes('ВСЕ'));
            if (allBtn) allBtn.classList.add('active');
            renderCurrentView();
        }

        // === ВЫБОР БРЕНДА ===
        function selectBrand(brand) {
            currentBrand = brand;
            renderCurrentView();
        }

        // === НАЗАД К СПИСКУ БРЕНДОВ ===
        function backToBrands() {
            currentBrand = null;
            renderCurrentView();
        }

        // === ОСНОВНАЯ ФУНКЦИЯ ОТОБРАЖЕНИЯ ===
        function renderCurrentView() {
            const grid = document.getElementById('productsGrid');

            let productsToShow = allProducts;
            if (currentCategory) {
                productsToShow = productsToShow.filter(p => p.category === currentCategory);
            }
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (query) {
                productsToShow = productsToShow.filter(p =>
                    p.taste.toLowerCase().includes(query) ||
                    p.brand.toLowerCase().includes(query)
                );
            }

            // Случай 1: выбран конкретный бренд → показываем его товары
            if (currentBrand) {
                const brandProducts = productsToShow.filter(p => p.brand === currentBrand);
                renderProducts(brandProducts, true);
                return;
            }

            // Случай 2: показываем список брендов
            if (productsToShow.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">— ТОВАРЫ НЕ НАЙДЕНЫ —</div>';
                return;
            }

            const brandsMap = new Map();
            productsToShow.forEach(p => {
                if (!brandsMap.has(p.brand)) {
                    brandsMap.set(p.brand, []);
                }
                brandsMap.get(p.brand).push(p);
            });

            let html = '';
            if (currentCategory) {
                html += `
                    <div style="grid-column:1/-1; margin-bottom:10px;">
                        <button class="category-btn" onclick="showAll()" style="margin-right:10px;">← ВСЕ</button>
                        <span style="color:rgba(255,255,255,0.5);">Категория: ${currentCategory}</span>
                    </div>
                `;
            }

            for (let [brand, items] of brandsMap.entries()) {
                const emoji = getEmojiForProduct(items[0]);
                const imgSrc = brandImages[brand] || '';
                html += `
                    <div class="product-card fade-in" onclick="selectBrand('${brand}')" style="cursor:pointer;">
                        <div class="product-brand">${emoji} ${brand}</div>
                        ${imgSrc ? `<img src="${imgSrc}" class="brand-photo" loading="lazy" onerror="this.style.display='none'" alt="${brand}">` : ''}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        // === РЕНДЕРИНГ ТОВАРОВ БРЕНДА ===
        function renderProducts(products, showBackButton = false) {
            const grid = document.getElementById('productsGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">— НЕТ ТОВАРОВ —</div>';
                return;
            }

            let html = '';
            if (showBackButton) {
                html += `
                    <div style="grid-column:1/-1; margin-bottom:10px;">
                        <button class="category-btn" onclick="backToBrands()">← К БРЕНДАМ</button>
                    </div>
                `;
            }

            products.forEach(p => {
                let stockClass = p.stock > 2 ? 'in-stock' : p.stock > 0 ? 'low-stock' : 'out-stock';
                let stockText = p.stock > 0 ? `${p.stock} шт` : 'НЕТ';
                let emoji = getEmojiForProduct(p);
                html += `
                    <div class="product-card fade-in">
                        <div class="product-brand">${emoji} ${p.brand}</div>
                        <div class="product-taste">${p.taste}</div>
                        <div class="product-details">
                            <span>${p.strength || ''}</span>
                            <span class="${stockClass}">${stockText}</span>
                        </div>
                        <div class="product-price">${p.price}</div>
                        <button class="add-btn" onclick="addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''}>
                            + ${p.stock <= 0 ? 'НЕТ' : 'В КОРЗИНУ'}
                        </button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // === ФИЛЬТРАЦИЯ ПО ПОИСКУ ===
        function filterProducts() {
            renderCurrentView();
        }

        // === КОРЗИНА С ТОСТАМИ ===
        function addToCart(id) {
            let product = allProducts.find(p => p.id === id);
            if (!product || product.stock <= 0) return;
            
            if (!cart[id]) {
                cart[id] = { ...product, quantity: 1 };
                showToast(`✅ +1 ${product.taste} · 1 шт в корзине`, 'success');
            } else {
                if (cart[id].quantity < product.stock) {
                    cart[id].quantity++;
                    showToast(`✅ +1 ${product.taste} · ${cart[id].quantity} шт`, 'success');
                } else {
                    handleMaxLimit(product);
                    return;
                }
            }
            saveCart();
            updateCartCount();
            animateCart();
        }

        function increaseQuantity(id) {
            let product = allProducts.find(p => p.id === id);
            if (!product) return;
            if (cart[id].quantity < product.stock) {
                cart[id].quantity++;
                saveCart();
                renderCartItems();
                updateCartCount();
            } else {
                handleMaxLimit(product);
            }
        }

        function decreaseQuantity(id) {
            if (cart[id].quantity > 1) {
                cart[id].quantity--;
                saveCart();
                renderCartItems();
                updateCartCount();
            } else {
                delete cart[id];
                saveCart();
                renderCartItems();
                updateCartCount();
            }
        }

        function saveCart() {
            localStorage.setItem('tokyoCart', JSON.stringify(cart));
        }

        function updateCartCount() {
            let total = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = total;
        }

        function animateCart() {
            let badge = document.getElementById('cartCount');
            badge.style.transform = 'scale(1.2)';
            setTimeout(() => badge.style.transform = 'scale(1)', 200);
        }

        function openCart() {
            renderCartItems();
            document.getElementById('cartOverlay').classList.add('show');
        }

        function closeCart() {
            document.getElementById('cartOverlay').classList.remove('show');
        }

        function closeCartOnOverlay(event) {
            if (event.target.classList.contains('cart-overlay')) {
                closeCart();
            }
        }

        function renderCartItems() {
            const container = document.getElementById('cartItemsList');
            const items = Object.values(cart);
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:30px; color:rgba(255,255,255,0.3);">🛒 КОРЗИНА ПУСТА</div>';
                updateCartTotal(0, 0);
                return;
            }
            let html = '';
            let totalSum = 0;
            let totalItems = 0;
            items.forEach(item => {
                let sum = item.price * item.quantity;
                totalSum += sum;
                totalItems += item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-brand">${item.brand}</div>
                        <div class="cart-item-taste">${item.taste}</div>
                        <div class="cart-item-row">
                            <span class="cart-item-price">${item.price}₽ × ${item.quantity} = ${sum}₽</span>
                            <div class="cart-item-controls">
                                <button onclick="decreaseQuantity('${item.id}')">−</button>
                                <span class="cart-item-quantity">${item.quantity}</span>
                                <button onclick="increaseQuantity('${item.id}')" 
                                        ${item.quantity >= item.stock ? 'disabled' : ''}>+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            updateCartTotal(totalSum, totalItems);
        }

        function updateCartTotal(sum, items) {
            document.getElementById('cartTotal').innerHTML = `
                <span>ИТОГО</span>
                <span>${sum} ₽ (${items} шт.)</span>
            `;
        }

        function submitOrder() {
            let items = Object.values(cart);
            if (items.length === 0) {
                showToast('🛒 Корзина пуста', 'info');
                return;
            }
            let message = '';
            let total = 0;
            let totalItems = 0;
            items.forEach(item => {
                let sum = item.price * item.quantity;
                total += sum;
                totalItems += item.quantity;
                let emoji = getEmojiForProduct(item);
                message += `${emoji} ${item.brand} — ${item.taste}\n`;
                message += `  ${item.quantity} × ${item.price}₽ = ${sum}₽\n\n`;
            });
            message += `━━━━━━━━━━━━━━━\n`;
            message += `ИТОГО: ${total} ₽ (${totalItems} шт.)`;
            let url = `https://t.me/${SELLER_USERNAME}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
            cart = {};
            localStorage.removeItem('tokyoCart');
            updateCartCount();
            closeCart();
            showToast('✅ Заказ отправлен!', 'success');
        }

        function clearCart() {
            if (Object.keys(cart).length > 0) {
                if (confirm('🗑️ Очистить корзину?')) {
                    cart = {};
                    localStorage.removeItem('tokyoCart');
                    updateCartCount();
                    renderCartItems();
                    showToast('🗑️ Корзина очищена', 'info');
                }
            }
        }

        document.getElementById('searchInput').addEventListener('input', filterProducts);

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram?.WebApp) {
                Telegram.WebApp.expand();
                Telegram.WebApp.setHeaderColor('#0a0a0c');
            }
            loadProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
